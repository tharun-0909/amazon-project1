services:
  # Fullstack Web Service (Express Backend serving Vite Frontend)
  - type: web
    name: amazon-project
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
